<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kalkulačka nemovitostí</title><!-- v2 -->
<meta name="theme-color" content="#1a2332">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Nemovitosti">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --navy:#1a2332;--blue:#4A9EE0;--teal:#4ECDA0;--amber:#f59e0b;--violet:#a78bfa;
  --red-lt:#fff5f5;--red-bd:#fde8e8;--red-tx:#8B2500;
  --grn-lt:#f0fdf8;--grn-bd:#d1f5e8;--grn-tx:#0A5940;
  --bg:#f4f6f9;--surface:#fff;--border:#dde1e7;--border2:#c4c9d4;
  --txt:#111827;--txt2:#374151;--txt3:#6b7280;
  --radius:10px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;max-width:100%}
html{scroll-behavior:smooth;overflow-x:hidden;width:100%}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:15px;line-height:1.6;overflow-x:hidden}
.topbar{background:var(--navy);height:52px;display:flex;align-items:center;padding:0 20px;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:28px;height:28px;background:var(--amber);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-name{font-size:14px;font-weight:600;color:#fff}
.logo-sub{font-size:10px;color:rgba(255,255,255,.4)}
.tb-btn{display:flex;align-items:center;gap:5px;padding:6px 10px;font-size:12px;font-family:var(--font);font-weight:500;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);transition:all .15s;white-space:nowrap}
.tb-btn svg{width:13px;height:13px;flex-shrink:0}
.topbar-actions{display:flex;gap:5px}
/* TABS */
.tabs-bar{background:var(--navy);border-top:1px solid rgba(255,255,255,.06);padding:0 16px;display:flex;align-items:flex-end;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.p-tab{display:flex;align-items:center;gap:5px;padding:7px 12px;font-size:12px;font-weight:500;font-family:var(--font);border:none;background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer;border-radius:7px 7px 0 0;transition:all .15s;white-space:nowrap;flex-shrink:0}
.p-tab:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.p-tab.active{background:var(--bg);color:var(--txt);font-weight:600}
.p-tab.sum-tab{color:var(--amber)}.p-tab.sum-tab.active{color:var(--navy)}
.tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tab-x{width:15px;height:15px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:rgba(255,255,255,.6);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;line-height:1}
.p-tab.active .tab-x{background:var(--border);color:var(--txt3)}
.tab-x:hover{background:var(--red-bd)!important;color:var(--red-tx)!important}
.tab-add{padding:6px 12px;font-size:12px;font-weight:700;font-family:var(--font);border:1px solid rgba(78,205,160,.5);background:rgba(78,205,160,.12);color:var(--teal);cursor:pointer;border-radius:7px 7px 0 0;white-space:nowrap;flex-shrink:0;transition:all .15s;display:flex;align-items:center;gap:5px}
.tab-add:hover{background:rgba(78,205,160,.25);border-color:var(--teal);color:#fff}
/* STRIP */
.hero-strip{background:var(--navy);padding:0;border-top:1px solid rgba(255,255,255,.06)}
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid rgba(255,255,255,.08)}
.kpi{padding:11px 12px;border-right:1px solid rgba(255,255,255,.08);min-width:0;overflow:hidden}
.kpi:last-child{border-right:none}
.kpi-label{font-size:9px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kpi-val{font-size:14px;font-weight:600;color:#fff;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-val.amber{color:var(--amber)}.kpi-val.teal{color:var(--teal)}.kpi-val.blue{color:var(--blue)}.kpi-val.red{color:#f87171}
/* LAYOUT */
.page{padding:14px;max-width:1100px;margin:0 auto}
.two-col{display:grid;grid-template-columns:330px 1fr;gap:14px;align-items:start}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.card:last-child{margin-bottom:0}
.card-hdr{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.card-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card-title{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em}
.card-body{padding:13px}
/* INPUTS */
.ig{margin-bottom:11px}.ig:last-child{margin-bottom:0}
.il{font-size:11px;color:var(--txt2);margin-bottom:3px;font-weight:600;display:block}
.iw{position:relative}
.iw input[type=number]{width:100%;padding:8px 44px 8px 10px;font-size:13px;font-family:var(--mono);border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--txt);outline:none;transition:border .15s;-webkit-appearance:none}
.iw input:focus{border-color:var(--blue);background:#fff}
.iu{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--txt3);pointer-events:none;font-weight:500}
.i2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px}
.i2 .ig{margin-bottom:0}
.hint{font-size:11px;color:var(--txt3);line-height:1.5;margin-top:3px}
/* SLIDER */
.sw{display:flex;align-items:center;gap:10px;margin-top:4px}
.sw input[type=range]{flex:1;height:4px;accent-color:var(--amber);cursor:pointer;min-width:0}
.sv{font-size:13px;font-weight:600;font-family:var(--mono);min-width:42px;text-align:right;white-space:nowrap}
.sv span{font-size:11px;font-weight:400;color:var(--txt3)}
/* TOGGLE */
.tbar{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px}
.topt{flex:1;padding:5px 8px;font-size:12px;font-weight:500;font-family:var(--font);border:none;background:none;color:var(--txt3);cursor:pointer;border-radius:4px;transition:all .15s;text-align:center;white-space:nowrap}
.topt.sel{background:var(--surface);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.1)}
/* CHART */
.cw{position:relative;width:100%;height:250px}
.pcw{position:relative;width:100%;height:260px}
.legend{display:flex;gap:10px;font-size:12px;color:var(--txt2);margin-bottom:8px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}
/* MILESTONES */
.mrow{display:grid;border-top:1px solid var(--border)}
.ms{padding:8px 9px;border-right:1px solid var(--border);text-align:center;min-width:0}
.ms:last-child{border-right:none}
.ms-yr{font-size:9px;color:var(--txt3);margin-bottom:1px;text-transform:uppercase;font-weight:500}
.ms-val{font-size:12px;font-weight:600;color:var(--txt);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ms-sub{font-size:10px;margin-top:1px}
/* RESULTS */
.rdark{background:linear-gradient(135deg,#1a2332 0%,#243447 100%);border-radius:9px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.rbig{flex:1;min-width:130px}
.rlbl{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.rnum{font-size:24px;font-weight:600;font-family:var(--mono);color:var(--teal);line-height:1}
.rsub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.rrows{display:flex;flex-direction:column;gap:5px;flex:2;min-width:170px}
.rrow{display:flex;justify-content:space-between;align-items:center;gap:8px}
.rrl{font-size:11px;color:rgba(255,255,255,.5)}
.rrv{font-size:12px;font-weight:600;font-family:var(--mono);color:#fff}
.rrv.amber{color:var(--amber)}.rrv.red{color:#f87171}.rrv.teal{color:var(--teal)}
/* BREAK EVEN */
.bebar{position:relative;height:18px;background:var(--bg);border-radius:9px;border:1px solid var(--border);overflow:hidden;margin:7px 0}
.befill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--amber),var(--teal));border-radius:9px;transition:width .4s}
.belbl{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:var(--navy)}
/* TABLE */
.cft{width:100%;border-collapse:collapse;font-size:11px;min-width:400px}
.cft th{position:sticky;top:0;background:var(--bg);padding:6px 7px;text-align:right;font-weight:600;font-size:10px;color:var(--txt3);border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;z-index:1}
.cft th:first-child{text-align:left}
.cft td{padding:4px 7px;text-align:right;border-bottom:1px solid #edf0f4;font-variant-numeric:tabular-nums;font-family:var(--mono)}
.cft td:first-child{text-align:left;font-family:var(--font);color:var(--txt3)}
.cft tr.hlm td{background:#f4f6f9;font-weight:600}
.cft tr:hover td{background:#f9fafb}
.pos{color:var(--grn-tx);font-weight:600}.neg{color:var(--red-tx);font-weight:600}
.cfsc{overflow-x:auto;overflow-y:auto;max-height:200px}
/* RENOV */
.rnlist{display:flex;flex-direction:column;gap:5px;margin-top:6px}
.rntag{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:12px}
.rntxt{flex:1;color:var(--txt2)}
.rntxt strong{color:var(--txt);font-weight:600}
.rndel{width:18px;height:18px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;font-size:12px;color:var(--txt3);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.rndel:hover{border-color:var(--red-bd);color:var(--red-tx);background:var(--red-lt)}
.rnform{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:10px;margin-top:6px;display:none}
.rnform.open{display:block}
.rnrow{display:flex;gap:7px;flex-wrap:wrap;align-items:flex-end}
.rff{display:flex;flex-direction:column;gap:3px}
.rff label{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase}
.rff input{padding:7px 8px;font-size:12px;font-family:var(--mono);border:1px solid var(--border);border-radius:5px;background:#fff;color:var(--txt);outline:none;-webkit-appearance:none}
.rff input:focus{border-color:var(--blue)}
.btn{padding:7px 11px;font-size:12px;font-family:var(--font);font-weight:500;border:1px solid var(--border);border-radius:6px;background:none;color:var(--txt);cursor:pointer;transition:all .15s}
.btn.primary{background:var(--navy);color:#fff;border-color:transparent}
.addbtn{display:flex;align-items:center;gap:5px;padding:6px 11px;font-size:12px;font-weight:600;font-family:var(--font);border-radius:6px;cursor:pointer;border:1px dashed var(--border2);background:none;color:var(--blue);transition:all .15s;margin-top:5px}
.addbtn:hover{background:var(--bg);border-color:var(--blue)}
/* COLOR PICK */
.cpick{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.cp{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s}
.cp.sel{border-color:#fff;box-shadow:0 0 0 2px var(--blue)}
/* NAME INPUT */
.nminp{background:none;border:none;border-bottom:1px dashed var(--border2);padding:2px 3px;font-size:14px;font-weight:600;font-family:var(--font);color:var(--txt);outline:none;width:100%;margin-bottom:10px}
.nminp:focus{border-bottom-color:var(--blue)}
/* SUMMARY */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:11px;margin-bottom:14px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:13px;cursor:pointer;transition:box-shadow .15s;position:relative;overflow:hidden}
.scard:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.scard-name{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:8px}
.sc-row{display:flex;justify-content:space-between;font-size:12px;padding-left:8px}
.sc-lbl{color:var(--txt3)}
.sc-val{font-weight:600;font-family:var(--mono);color:var(--txt)}
/* FOOTER */
.footer{background:var(--navy);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-top:14px}
.footer span{font-size:11px;color:rgba(255,255,255,.35)}
.footer a{font-size:11px;color:rgba(255,255,255,.4);text-decoration:none}
.footer a:hover{color:var(--amber)}
@media print{.topbar,.tabs-bar,.footer,.addbtn,.rnform,.btn{display:none!important}.page{padding:8px}.card{break-inside:avoid}.cw{height:180px}body{background:#fff}}
@media(max-width:768px){
  html,body{overflow-x:hidden;max-width:100vw}
  .page{padding:8px}.two-col{grid-template-columns:1fr;gap:10px}
  .kpi-strip{grid-template-columns:1fr 1fr 1fr}.kpi:nth-child(4),.kpi:nth-child(5){display:none}
  .kpi{padding:8px 9px}.kpi-val{font-size:13px}
  .card-body{padding:10px}.cw{height:190px}
  .mrow{grid-template-columns:1fr 1fr}.i2{grid-template-columns:1fr 1fr}
  .rdark{flex-direction:column;gap:10px}
  .topbar-actions .tb-btn span{display:none}.topbar-actions .tb-btn{padding:6px 8px}
  .logo-sub{display:none}.sgrid{grid-template-columns:1fr}
}
</style>
</head>

<script>
const LS='nem-v2';
const COLORS=['#f59e0b','#4ECDA0','#4A9EE0','#a78bfa','#f87171','#34d399','#fb923c','#60a5fa','#e879f9','#a3e635'];
let props=[],aid=null,pid=0;
let charts={};

function np(ov={}){
  pid++;
  return{id:pid,name:'Nemovitost '+pid,color:COLORS[(pid-1)%COLORS.length],
    price:'',yr:new Date().getFullYear(),by:null,growth:5,hor:20,
    mortg:false,eq:'',mr:5,my:25,refixes:[],
    rent:true,rm:'',rg:3,oc:92,
    cm:'',cg:2,
    renovs:[],...ov};
}

const fmt=n=>new Intl.NumberFormat('cs-CZ',{style:'currency',currency:'CZK',maximumFractionDigits:0}).format(Math.round(n||0));
const fs=n=>{const a=Math.abs(n||0);if(a>=1000000)return (n/1000000).toFixed(1).replace('.0','')+' M';if(a>=10000)return Math.round(n/1000)+'k';return Math.round(n)+' Kč';};
const nv=(v,f=0)=>{const p=parseFloat(v);return isNaN(p)?f:p;};
const ge=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[<>"]/g,c=>({'<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function pmt(pr,ar,y){if(pr<=0)return 0;if(ar<=0)return pr/(y*12);const r=ar/12,n=y*12;return pr*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);}

function sim(p){
  const price=nv(p.price,0),gr=p.growth/100,hor=p.hor;
  const startYr=parseInt(p.yr)||new Date().getFullYear();  // ensure number
  const loan=p.mortg?Math.max(0,price-nv(p.eq,0)):0;
  const rg=p.rg/100,oc=p.oc/100;
  const mc=nv(p.cm,0),cg=(p.cg||0)/100;
  let bal=loan,annP=[],annI=[];
  if(loan>0){
    let rate=p.mr/100,pay=pmt(loan,rate,p.my);
    const tot=p.my*12,pd=[];
    // Build rate schedule from refixes (sorted by calendar year)
    const refixes=(p.refixes||[]).slice().sort((a,b)=>a.yr-b.yr);
    for(let m=0;m<tot;m++){
      const calYr=startYr+Math.floor(m/12);
      // Check if any refix applies at this month's year
      for(const rx of refixes){
        if(calYr===rx.yr&&m%12===0&&bal>0){
          rate=rx.rate/100;
          pay=pmt(bal,rate,(tot-m)/12);
        }
      }
      const int=bal*rate/12,prin=Math.min(pay-int,bal);
      bal=Math.max(0,bal-prin);pd[m]={pay,int,prin};
    }
    for(let y=0;y<hor;y++){let yp=0,yi=0;for(let m=y*12;m<Math.min((y+1)*12,tot);m++){if(pd[m]){yp+=pd[m].pay;yi+=pd[m].int;}}annP[y]=yp;annI[y]=yi;}
  } else {for(let y=0;y<hor;y++){annP[y]=0;annI[y]=0;}}

  // Track year-end mortgage balance
  const annBal=Array(hor+1).fill(0);
  if(loan>0){
    let b2=loan,rate2=p.mr/100;
    const refixes2=(p.refixes||[]).slice().sort((a,b)=>a.yr-b.yr);
    let pay2=pmt(b2,rate2,p.my);
    const tot2=p.my*12;
    for(let m=0;m<tot2;m++){
      const cy2=startYr+Math.floor(m/12);
      for(const rx of refixes2){if(cy2===rx.yr&&m%12===0&&b2>0){rate2=rx.rate/100;pay2=pmt(b2,rate2,(tot2-m)/12);}}
      const int2=b2*rate2/12,prin2=Math.min(pay2-int2,b2);
      b2=Math.max(0,b2-prin2);
      const yr2=Math.ceil((m+1)/12);
      if(yr2<=hor)annBal[yr2]=b2;
    }
  }
  const rows=[];let cCF=0,cR=0,cC=0,cM=0,cRv=0,be=null;
  for(let y=0;y<=hor;y++){
    const val=price*Math.pow(1+gr,y);
    const rent=y===0?0:nv(p.rm,0)*Math.pow(1+rg,y-1)*12*(p.rent?oc:0);
    const cost=y===0?0:mc*Math.pow(1+cg,y-1)*12;
    const mp=y===0?0:(annP[y-1]||0);
    // Renovations use calendar year
    const calYr=startYr+y;
    const rv=p.renovs.filter(r=>r.year===calYr).reduce((s,r)=>s+r.amount,0);
    const cf=rent-cost-mp-rv;
    if(y>0){cR+=rent;cC+=cost;cM+=mp;cRv+=rv;cCF+=cf;}
    if(be===null&&y>0&&cCF+(val-price)>=0)be=y;
    rows.push({y,cy:startYr+y,val,rent,cost,mp,rv,cf,cCF,cR,cC,cM,cRv,debt:annBal[y]||0});
  }
  return{rows,be,ti:annI.reduce((s,v)=>s+v,0),price,loan};
}

function renderTabs(){
  const bar=ge('tabs-bar');bar.innerHTML='';
  const st=document.createElement('button');st.type='button';
  st.className='p-tab sum-tab'+(aid===null?' active':'');
  st.innerHTML='<span>📊 Přehled</span>';
  st.addEventListener('click',()=>{aid=null;renderAll();});
  bar.appendChild(st);
  props.forEach(p=>{

function renderSum(){
  ge('view-sum').style.display='';ge('view-prop').style.display='none';
  const grid=ge('sgrid');grid.innerHTML='';
  props.forEach(p=>{
    const r=sim(p),l=r.rows[r.rows.length-1];

    const d=document.createElement('div');d.className='scard';
    d.innerHTML=`<div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${p.color};border-radius:9px 0 0 9px"></div>

      <div class="sc-row"><span class="sc-lbl">Kupní cena</span><span class="sc-val">${fs(price)} Kč</span></div>
      <div class="sc-row"><span class="sc-lbl">Hodnota za ${p.hor}l</span><span class="sc-val" style="color:var(--amber)">${fs(l.val)} Kč</span></div>
      <div class="sc-row"><span class="sc-lbl">Zhodnocení</span><span class="sc-val" style="color:var(--teal)">+${fs(gain)} Kč</span></div>

    d.addEventListener('click',()=>{aid=p.id;renderAll();});
    grid.appendChild(d);
  });
  // Portfolio chart
  const canvas=ge('pf-chart');if(!canvas)return;
  if(charts['pf'])charts['pf'].destroy();
  const maxH=Math.max(...props.map(p=>p.hor));
  const minYr=Math.min(...props.map(p=>parseInt(p.yr)||2024));
  const labels=Array.from({length:maxH+1},(_,i)=>minYr+i);

  const datasets=props.map(p=>{
    const r=sim(p),off=(parseInt(p.yr)||2024)-minYr;
    const data=Array(maxH+1).fill(0);
    r.rows.forEach(row=>{data[off+row.y]=Math.round(row.val);});
    return{label:p.name,data,backgroundColor:p.color+'bb',borderColor:p.color,borderWidth:1,borderRadius:0,stack:'s'};
  });

  ge('pf-legend').innerHTML=props.map(p=>`<div class="li"><div class="ld" style="background:${p.color}"></div><span>${esc(p.name)}</span></div>`).join('');
  charts['pf']=new Chart(canvas,{
    type:'bar',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{
        x:{stacked:true,grid:{display:false},ticks:{font:{size:10},color:'#6b7280',maxTicksLimit:10}},
        y:{stacked:true,grid:{color:'#edf0f4'},ticks:{font:{size:10},color:'#6b7280',callback:v=>{const m=v/1000000;return m>=1?(m.toFixed(1)+' M'):Math.round(v/1000)+'k';}}}
      },
      plugins:{
        legend:{display:false},
        tooltip:{mode:'index',callbacks:{
          label:i=>`${i.dataset.label}: ${fmt(i.raw)}`,
          footer:items=>{const t=items.reduce((s,i)=>s+(i.raw||0),0);return items.length>1?'Celkem: '+fmt(t):'';}
        }}
      }
    }
  });
}

function renderRenovs(p){
  const l=ge('rnlist');if(!l)return;l.innerHTML='';
  if(!p.renovs.length){l.innerHTML='<div style="font-size:11px;color:var(--txt3)">Zatím žádné.</div>';return;}
  p.renovs.sort((a,b)=>a.year-b.year).forEach((r,i)=>{
    const d=document.createElement('div');d.className='rntag';
    d.innerHTML=`<div class="rntxt"><strong>Rok ${r.year}${r.desc?' · '+esc(r.desc):''}</strong> — ${fmt(r.amount)}</div><button type="button" class="rndel" data-i="${i}">×</button>`;
    d.querySelector('.rndel').addEventListener('click',()=>{p.renovs.splice(i,1);renderRenovs(p);recalc(p);});
    l.appendChild(d);
  });
}

function renderRefixes(p){
  const l=ge('refix-list');if(!l)return;l.innerHTML='';
  if(!p.refixes||!p.refixes.length){l.innerHTML='<div style="font-size:11px;color:var(--txt3)">Žádné refixace.</div>';return;}
  p.refixes.slice().sort((a,b)=>a.yr-b.yr).forEach((rx,i)=>{
    const d=document.createElement('div');d.className='rntag';
    d.innerHTML=`<div class="rntxt"><strong>${rx.yr}</strong> → <strong>${rx.rate} %</strong></div><button type="button" class="rndel" data-i="${i}">×</button>`;
    d.querySelector('.rndel').addEventListener('click',()=>{p.refixes.splice(i,1);renderRefixes(p);recalc(p);});
    l.appendChild(d);
  });
}

function wireL(p){
  const sl=(id,vId,key)=>{const e=ge(id);if(!e)return;e.addEventListener('input',ev=>{if(ge(vId))ge(vId).textContent=ev.target.value;p[key]=parseFloat(ev.target.value);recalc(p);});};
  sl('pgr','pgr-v','growth');sl('pho','pho-v','hor');sl('poc','poc-v','oc');
  const ni=(id,key,num=false)=>{const e=ge(id);if(!e)return;e.addEventListener('input',ev=>{p[key]=num?parseFloat(ev.target.value)||0:ev.target.value;recalc(p);});};
  ni('pnm','name');ni('pp','price',true);ni('pyr','yr',true);ni('pby','by',true);
  ni('peq','eq');ni('pmr','mr');ni('pmy','my');
  ni('prm','rm');ni('prg','rg');
  ni('pcm','cm');ni('pcg','cg');
  ge('btn-del-prop')?.addEventListener('click',()=>{
    if(props.length<=1)return;
    props=props.filter(x=>x.id!==p.id);
    aid=props[0].id;
    renderAll();
  });
  ge('rfx-ok')?.addEventListener('click',()=>{
    const yr=parseInt(ge('rfx-yr').value)||0;
    const rate=parseFloat(ge('rfx-rate').value)||0;
    if(!yr||!rate)return;
    if(!p.refixes)p.refixes=[];
    p.refixes.push({yr,rate});
    ge('rfx-yr').value='';ge('rfx-rate').value='';
    renderRefixes(p);recalc(p);
  });
  renderRefixes(p);
  ge('pnm')?.addEventListener('input',e=>{p.name=e.target.value||'Nemovitost';renderTabs();});
  document.querySelectorAll('.cp').forEach(el=>el.addEventListener('click',()=>{p.color=el.dataset.c;document.querySelectorAll('.cp').forEach(e=>e.classList.toggle('sel',e===el));renderTabs();recalc(p);}));
  const tog=(yId,nId,key,wId)=>{
    ge(yId)?.addEventListener('click',()=>{p[key]=true;ge(yId).classList.add('sel');ge(nId).classList.remove('sel');if(ge(wId))ge(wId).style.display='';recalc(p);});
    ge(nId)?.addEventListener('click',()=>{p[key]=false;ge(nId).classList.add('sel');ge(yId).classList.remove('sel');if(ge(wId))ge(wId).style.display='none';recalc(p);});
  };
  tog('myes','mno','mortg','mwrap');tog('ryes','rno','rent','rwrap');
  ge('rnadd')?.addEventListener('click',()=>ge('rnform').classList.toggle('open'));
  ge('rfok')?.addEventListener('click',()=>{
    const amt=Math.abs(parseFloat(ge('rfamt').value)||0);
    if(!amt){ge('rfamt').style.borderColor='var(--red-tx)';setTimeout(()=>ge('rfamt').style.borderColor='',2000);return;}
    const yr=parseInt(ge('rfyr').value)||p.yr;
    p.renovs.push({year:yr,amount:amt,desc:ge('rfdesc').value.trim()});
    ge('rfamt').value='';ge('rfdesc').value='';renderRenovs(p);recalc(p);
  });
}

    <div class="card-hdr"><div class="card-dot" style="background:var(--navy)"></div><div class="card-title">Rok po roce</div></div>
    <div class="cfsc"><table class="cft">
      <thead><tr><th style="text-align:left">Rok</th><th>Hodnota</th><th>Splátka</th><th>Nájem</th><th>Náklady</th><th>CF</th><th>Kum.CF</th></tr></thead>
      <tbody id="cfbody"></tbody>
    </table></div>
  </div>`;
  renderChart(p,rows,'val');renderMrow(p,rows);renderCFTable(p,rows);
  ge('ctog')?.querySelectorAll('.topt').forEach(btn=>{
    btn.addEventListener('click',()=>{ge('ctog').querySelectorAll('.topt').forEach(b=>b.classList.toggle('sel',b===btn));renderChart(p,rows,btn.dataset.m);});
  });
}

function renderChart(p,rows,mode){
  const canvas=ge('pchart');if(!canvas)return;
  if(charts[p.id])charts[p.id].destroy();
  const step=p.hor<=15?2:p.hor<=25?5:10;
  let ds,leg;
  if(mode==='val'){
    const hasDebt=rows.some(r=>r.debt>0);
    if(hasDebt){
      ds=[
        {label:'Vlastní hodnota (equity)',data:rows.map(r=>Math.round(Math.max(0,r.val-r.debt))),backgroundColor:p.color+'cc',stack:'v'},
        {label:'Zůstatek hypotéky',data:rows.map(r=>-Math.round(r.debt)),backgroundColor:'#f8717155',borderColor:'#f87171',borderWidth:1,stack:'d'},
      ];
      leg=`<div class="li"><div class="ld" style="background:${p.color}"></div><span>Vlastní hodnota</span></div><div class="li"><div class="ld" style="background:#f87171;opacity:.7"></div><span>Zůstatek hypotéky</span></div>`;
    } else {
      ds=[{label:'Hodnota',data:rows.map(r=>Math.round(r.val)),backgroundColor:p.color+'cc',stack:'v'}];
      leg=`<div class="li"><div class="ld" style="background:${p.color}"></div><span>Hodnota nemovitosti</span></div>`;
    }
  } else {
    ds=[{label:'Kum.CF',data:rows.map(r=>Math.round(r.cCF)),backgroundColor:rows.map(r=>r.cCF>=0?'#4ECDA0aa':'#f87171aa'),stack:'c'},
        {label:'Roční CF',data:rows.map(r=>Math.round(r.cf)),type:'line',borderColor:'#4A9EE0',pointRadius:1,fill:false,tension:.3,borderWidth:2}];
    leg=`<div class="li"><div class="ld" style="background:#4ECDA0"></div><span>Kum. CF</span></div><div class="li"><div class="ld" style="background:#4A9EE0"></div><span>Roční CF</span></div>`;
  }
  if(ge('cleg'))ge('cleg').innerHTML=leg;
  charts[p.id]=new Chart(canvas,{type:'bar',data:{labels:rows.map(r=>r.cy),datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#6b7280',maxTicksLimit:12,callback:(v,i)=>{const yr=rows[i]?.cy;return yr&&(yr-parseInt(p.yr))%step===0?yr:null;}}},
        y:{stacked:mode==='val',grid:{color:'#edf0f4'},ticks:{font:{size:10},color:'#6b7280',callback:v=>{const m=v/1000000;return m>=1?(m.toFixed(1)+' M'):Math.round(v/1000)+'k';}}}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>`${i.dataset.label}: ${fmt(i.raw)}`}}}}});
}

function renderMrow(p,rows){
  const el=ge('pmrow');if(!el)return;
  const hor=p.hor,marks=[Math.round(hor*.25),Math.round(hor*.5),Math.round(hor*.75),hor];
  el.innerHTML=marks.map(y=>{const r=rows[y]||rows[rows.length-1];return `<div class="ms"><div class="ms-yr">Rok ${y}</div><div class="ms-val">${fs(r.val)} Kč</div><div class="ms-sub" style="color:${r.cCF>=0?'var(--grn-tx)':'var(--red-tx)'}">CF: ${fs(r.cCF)}</div></div>`;}).join('');
}

function renderCFTable(p,rows){
  const tb=ge('cfbody');if(!tb)return;tb.innerHTML='';
  const hor=p.hor,step=hor<=10?1:hor<=20?2:5;
  rows.forEach(r=>{
    if(r.y===0||r.y%step!==0&&r.y!==hor)return;
    const tr=document.createElement('tr');if(r.y===hor||r.y%10===0)tr.className='hlm';
    tr.innerHTML=`<td>${r.cy}</td><td>${fs(r.val)} Kč</td><td class="${r.mp>0?'neg':''}">${r.mp>0?'−'+fs(r.mp)+' Kč':'—'}</td><td class="${r.rent>0?'pos':''}">${r.rent>0?'+'+fs(r.rent)+' Kč':'—'}</td><td class="neg">${r.cost>0?'−'+fs(r.cost)+' Kč':'—'}</td><td class="${r.cf>=0?'pos':'neg'}">${fs(r.cf)} Kč</td><td class="${r.cCF>=0?'pos':'neg'}">${fs(r.cCF)} Kč</td>`;
    tb.appendChild(tr);
  });
}

function recalc(p){
  if(p&&aid===p.id){const r=sim(p);renderR(p,r);}
  renderGKPIs();saveState();
}

function renderAll(){
  renderTabs();renderGKPIs();
  if(aid===null)renderSum();
  else{const p=props.find(x=>x.id===aid);if(p)renderProp(p);}
  saveState();
}

function saveState(){try{localStorage.setItem(LS,JSON.stringify({props,aid,pid}));}catch(e){}}
function loadSt(s){if(s.props&&s.props.length){props=s.props;pid=s.pid||props.length;}if(s.aid!==undefined)aid=s.aid;}

ge('btn-save').addEventListener('click',()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({props,aid,pid},null,2)],{type:'application/json'}));a.download='nemovitosti.json';a.click();});
ge('btn-load').addEventListener('change',e=>{const r=new FileReader();r.onload=ev=>{try{loadSt(JSON.parse(ev.target.result));renderAll();}catch{alert('Soubor není platný.');}};r.readAsText(e.target.files[0]);});

try{const s=localStorage.getItem(LS);if(s){loadSt(JSON.parse(s));}else{const p=np();props.push(p);aid=p.id;}}catch(e){const p=np();props.push(p);aid=p.id;}
renderAll();
</script>
</body>
</html>
