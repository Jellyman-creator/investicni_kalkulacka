<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Finzzard</title>
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Finzzard">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

html,body{
  height:100%;
  font-family:'DM Sans',sans-serif;
  background:#0f172a;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── NAV ── */
.nav{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  background:#0f172a;
  border-bottom:1px solid rgba(255,255,255,.1);
  flex-shrink:0;
}
.nav-btn{
  padding:14px 8px 12px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  border:none;background:none;
  color:rgba(255,255,255,.35);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;
  border-right:1px solid rgba(255,255,255,.06);
  position:relative;
}
.nav-btn:last-child{border-right:none}
.nav-btn.active{color:#fff;background:rgba(255,255,255,.07)}
.nav-btn.active::after{
  content:'';
  position:absolute;bottom:0;left:15%;right:15%;
  height:3px;border-radius:2px 2px 0 0;
  background:linear-gradient(90deg,#6366f1,#2dd4bf);
}
.nav-icon{font-size:24px;line-height:1}

/* ── CONTENT ── */
.content{
  flex:1;
  position:relative;
  background:#f4f6f9;
}

iframe{
  position:absolute;
  inset:0;
  width:100%;height:100%;
  border:none;
  display:none;
  background:#f4f6f9;
}
iframe.active{display:block}

/* ── LOADER ── */
.loader{
  position:absolute;inset:0;
  background:#0f172a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  z-index:10;
  transition:opacity .3s;
}
.loader.gone{opacity:0;pointer-events:none}
.spinner{
  width:36px;height:36px;
  border:3px solid rgba(255,255,255,.1);
  border-top-color:#6366f1;
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-size:13px;color:rgba(255,255,255,.4)}

/* ── PREF BTN ── */
.pref-row{
  display:flex;justify-content:space-between;align-items:center;
  background:#0f172a;padding:10px 16px 0;
  flex-shrink:0;
}
.logo-txt{font-size:13px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:-.01em}
.logo-txt span{color:#2dd4bf}
.pref-btn{
  font-size:11px;color:rgba(255,255,255,.35);
  background:none;border:1px solid rgba(255,255,255,.1);
  border-radius:5px;padding:3px 8px;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all .15s;
}
.pref-btn:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.25)}

/* ── PREF POPUP ── */
.pref-popup{
  position:fixed;top:60px;right:10px;
  background:#1e293b;border:1px solid rgba(255,255,255,.15);
  border-radius:10px;padding:8px;min-width:190px;
  z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.5);
  display:none;
}
.pref-popup.open{display:block}
.pref-ttl{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.07em;padding:4px 8px 8px}
.pref-opt{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;border-radius:7px;
  cursor:pointer;font-size:13px;font-weight:500;
  color:rgba(255,255,255,.6);
  transition:background .12s;
}
.pref-opt:hover{background:rgba(255,255,255,.08);color:#fff}
.pref-opt.sel{background:rgba(99,102,241,.2);color:#fff}
.pref-opt-star{margin-left:auto;color:#fbbf24;font-size:13px}

@media(max-width:400px){
  .nav-btn{padding:12px 4px 10px}
  .nav-icon{font-size:20px}
}
</style>
</head>

    <span class="nav-icon">💰</span>Finance
  </button>
  <button class="nav-btn" data-app="invest" type="button">
    <span class="nav-icon">📈</span>Investice
  </button>
  <button class="nav-btn" data-app="real" type="button">
    <span class="nav-icon">🏠</span>Nemovitosti
  </button>
</nav>

<div class="content">
  <iframe id="frame-finance"></iframe>
  <iframe id="frame-invest"></iframe>
  <iframe id="frame-real"></iframe>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="loader-txt">Načítání…</div>
  </div>
</div>

<div class="pref-popup" id="pref-popup">
  <div class="pref-ttl">Otevírat jako první</div>
  <div class="pref-opt" data-app="finance"><span>💰</span>Finance<span class="pref-opt-star" id="s-finance">★</span></div>
  <div class="pref-opt" data-app="invest"><span>📈</span>Investice<span class="pref-opt-star" id="s-invest">★</span></div>
  <div class="pref-opt" data-app="real"><span>🏠</span>Nemovitosti<span class="pref-opt-star" id="s-real">★</span></div>
</div>

<script>
const SRCS = {
  finance: 'finance.html',
  invest:  'investice.html',
  real:    'nemovitosti.html'
};
const PK = 'finzzard-default';
const LAST_KEY = 'finzzard-last';
let def = localStorage.getItem(PK) || 'finance';
// sessionStorage remembers tab across F5/reload, localStorage remembers default
let startTab = sessionStorage.getItem(LAST_KEY) || def;
let cur = null;
const loaded = {};

function show(app){
  if(cur === app) return;
  if(cur) document.getElementById('frame-'+cur).classList.remove('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.app===app));
  cur = app;
  sessionStorage.setItem(LAST_KEY, app); // remember for refresh

  const fr = document.getElementById('frame-'+app);
  fr.classList.add('active');

  if(!loaded[app]){
    document.getElementById('loader').classList.remove('gone');
    fr.onload = ()=>{
      document.getElementById('loader').classList.add('gone');
      loaded[app] = true;
    };
    fr.src = SRCS[app];
  } else {
    document.getElementById('loader').classList.add('gone');
  }
}

// Nav clicks
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>show(btn.dataset.app));
});

// Preference popup
function updatePrefUI(){
  ['finance','invest','real'].forEach(a=>{
    document.getElementById('s-'+a).style.display = a===def ? '' : 'none';
    document.querySelector(`.pref-opt[data-app="${a}"]`).classList.toggle('sel', a===def);
  });
}
document.getElementById('pref-btn').addEventListener('click', e=>{
  e.stopPropagation();
  document.getElementById('pref-popup').classList.toggle('open');
});
document.querySelectorAll('.pref-opt').forEach(opt=>{
  opt.addEventListener('click', ()=>{
    def = opt.dataset.app;
    localStorage.setItem(PK, def);
    updatePrefUI();
    document.getElementById('pref-popup').classList.remove('open');
  });
});
document.addEventListener('click', ()=>document.getElementById('pref-popup').classList.remove('open'));

// Init — restore last tab or default
updatePrefUI();
show(startTab);
</script>
